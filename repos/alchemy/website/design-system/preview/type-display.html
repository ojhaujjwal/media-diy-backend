<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Display type</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .display {
        font-family: var(--alc-font-serif);
        font-weight: 500;
        font-size: 72px;
        line-height: 1.02;
        letter-spacing: -0.015em;
        color: var(--alc-fg-1);
      }
      .display .em {
        color: var(--alc-accent-deep);
        font-style: italic;
        font-weight: 500;
      }
      .meta {
        font-family: var(--alc-font-mono);
        font-size: 11px;
        color: var(--alc-fg-3);
        margin-top: 16px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="display">
        Infrastructure as <span class="em">Effects</span>.
      </div>
      <div class="meta">
        Source Serif 4 · 500 · 72/74 · -0.015em · italic moss on emphasis
      </div>
    </div>
  </body>
</html>
