<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hand lettering</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .wrap {
        background: var(--alc-bg-elev-1);
        border: 1px solid var(--alc-hairline);
        border-radius: 8px;
        padding: 28px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .hand {
        font-family: "Caveat", cursive;
        font-weight: 700;
        font-size: 42px;
        color: var(--alc-accent-deep);
        line-height: 1;
      }
      .arrow {
        font-family: "Caveat", cursive;
        font-size: 38px;
        color: var(--alc-walnut-600);
        font-weight: 600;
      }
      .meta {
        font-family: var(--alc-font-mono);
        font-size: 11px;
        color: var(--alc-fg-3);
        margin-top: 12px;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wrap">
        <span class="hand">Function</span>
        <span class="arrow">→</span>
        <span class="hand">Binding</span>
        <span class="arrow">→</span>
        <span class="hand">Resource</span>
      </div>
      <div class="meta">
        Caveat 700 · hand-drawn diagram labels · moss on parchment
      </div>
    </div>
  </body>
</html>
